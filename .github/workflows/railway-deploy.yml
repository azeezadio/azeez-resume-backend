name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript build
        run: yarn build

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE || vars.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
        run: |
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Missing RAILWAY_PROJECT_ID secret."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          fi

          if [ -z "$RAILWAY_SERVICE" ]; then
            echo "Missing RAILWAY_SERVICE secret or variable."
            echo "Your Railway project has multiple services, so CI needs the exact app service id or name."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi

          railway up \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT"
